<div
  class="to-page-header"
  [attr.data-testid]="testId"
>
  <div class="to-page-header__content">
    @if (eyebrow) {
      <div class="to-page-header__eyebrow">
        {{ eyebrow }}
      </div>
    }

    <h1 class="to-page-header__title text-xl">
      {{ title }}
    </h1>

    @if (subtitle) {
      <p class="to-page-header__subtitle text-xs">
        {{ subtitle }}
      </p>
    }
  </div>

  <div class="to-page-header__actions">
    <ng-content select="[header-actions]"></ng-content>
  </div>
</div>
