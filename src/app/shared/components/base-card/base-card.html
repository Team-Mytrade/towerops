<section class="to-card" [attr.data-testid]="testid()">
  @if (title() || subtitle()) {
    <header class="to-card__header">
      @if (title()) {
        <h2 class="to-card__title">{{ title() }}</h2>
      }

      @if (subtitle()) {
        <p class="to-card__subtitle">{{ subtitle() }}</p>
      }
    </header>
  }

  <div class="to-card__body">
    <ng-content />
  </div>
</section>
