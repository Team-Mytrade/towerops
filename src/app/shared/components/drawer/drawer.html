@if (open()) {

  <!-- Overlay -->

  <div
    class="fx-drawer__overlay"
    (click)="onBackdropClick()"
  ></div>

  <!-- Drawer -->

  <div
    class="fx-drawer"
    role="dialog"
    aria-modal="true"
  >

    <div
      [class]="drawerClasses()"
      (click)="$event.stopPropagation()"
    >

      <!-- Handle -->

      @if (
        showHandle() &&
        (
          isBottom() ||
          isTop()
        )
      ) {

        <div
          class="fx-drawer__handle"
        ></div>

      }

      <!-- Close -->

      @if (showClose()) {

        <button
          type="button"
          class="fx-drawer__close"
          (click)="close()"
        >
          ✕
        </button>

      }

      <!-- Header -->

      @if (
        title() ||
        description()
      ) {

        <div
          class="fx-drawer__header"
        >

          @if (title()) {

            <div
              class="fx-drawer__title"
            >
              {{ title() }}
            </div>

          }

          @if (description()) {

            <div
              class="fx-drawer__description"
            >
              {{ description() }}
            </div>

          }

        </div>

      }

      <!-- Content -->

      <div
        class="fx-drawer__content"
      >

        <ng-content />

      </div>

      <!-- Footer -->

      <div
        class="fx-drawer__footer"
      >

        <ng-content
          select="[drawer-footer]"
        />

      </div>

      <!-- Loading -->

      @if (loading()) {

        <div
          class="fx-drawer__loading"
        >
          Loading...
        </div>

      }

    </div>

  </div>

}
