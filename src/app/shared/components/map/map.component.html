<div class="to-map-shell" [style.height]="height">
  <button type="button" class="to-map-locate-btn" (click)="useMyLocation()" [disabled]="locating" title="My Location">
    @if (locating) {
    <span class="to-map-spinner"></span>
    } @else {
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
    </svg>
    }
  </button>

  <div #mapContainer class="to-map-container"></div>
</div>
