<section class="to-empty-state" data-testid="empty-state">
  <div class="to-empty-state__icon">
    <i [class]="icon()"></i>
  </div>

  <h2 class="to-empty-state__title">
    {{ title() }}
  </h2>

  <p class="to-empty-state__message">
    {{ message() }}
  </p>

  @if (actionLabel()) {
    <p-button
      [label]="actionLabel()"
      [icon]="actionIcon()"
      data-testid="empty-state-action-btn"
      (click)="onAction()"
    ></p-button>
  }
</section>
