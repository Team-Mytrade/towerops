@if (open()) {
  <div
    class="fx-dialog__overlay"
    (click)="onBackdropClick()"
  ></div>

  <div
    class="fx-dialog"
    role="dialog"
    aria-modal="true"
  >
    <div
      [class]="dialogClasses()"
      (click)="$event.stopPropagation()"
    >
      @if (showClose()) {
        <button
          type="button"
          class="fx-dialog__close"
          aria-label="Close dialog"
          (click)="close()"
        >
          ✕
        </button>
      }

      @if (title() || description()) {
        <div class="fx-dialog__header">
          @if (title()) {
            <div class="fx-dialog__title">
              {{ title() }}
            </div>
          }

          @if (description()) {
            <div class="fx-dialog__description">
              {{ description() }}
            </div>
          }
        </div>
      }

      <div class="fx-dialog__content">
        <ng-content />
      </div>

      @if (showFooter()) {
        <div class="fx-dialog__footer">
          <ng-content select="[dialog-footer]" />
        </div>
      }

      @if (loading()) {
        <div class="fx-dialog__loading">
          <i class="pi pi-spin pi-spinner"></i>
        </div>
      }
    </div>
  </div>
}
