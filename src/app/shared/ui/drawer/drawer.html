@if (open()) {
  <div class="to-drawer-backdrop" data-testid="drawer-backdrop" (click)="closed.emit()">
    <aside
      class="to-drawer"
      [class]="'to-drawer--' + size()"
      data-testid="drawer"
      (click)="$event.stopPropagation()"
    >
      <header class="to-drawer__head">
        <div>
          @if (eyebrow()) {
            <p class="label-tag">{{ eyebrow() }}</p>
          }

          <h2>{{ title() }}</h2>
        </div>

        <button type="button" data-testid="drawer-close-btn" (click)="closed.emit()">
          <i class="pi pi-times"></i>
        </button>
      </header>

      <section class="to-drawer__body">
        <ng-content />
      </section>

      <footer class="to-drawer__footer">
        <ng-content select="[drawer-actions]" />
      </footer>
    </aside>
  </div>
}
