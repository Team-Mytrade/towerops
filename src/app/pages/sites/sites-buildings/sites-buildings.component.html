<section class="sites-buildings-page" data-testid="sites-buildings-page">
  <article class="sites-map-card">
    <div class="sites-map">
      <to-map [markers]="filteredBuildings()" />
    </div>
  </article>

  <div class="sites-toolbar">
    <div class="sites-search">
      <i class="pi pi-search"></i>

      <input
        pInputText
        type="text"
        placeholder="Search buildings..."
        [ngModel]="search()"
        (ngModelChange)="search.set($event)"
        data-testid="buildings-search"
      />
    </div>

    <p-select
      [options]="statusOptions"
      [ngModel]="status()"
      (ngModelChange)="status.set($event)"
      optionLabel="label"
      optionValue="value"
      data-testid="buildings-status-filter"
    />
  </div>

  <div class="sites-grid">
    @for (building of filteredBuildings(); track building.id) {
      <a
        class="site-card"
        [routerLink]="['/sites/buildings', building.id]"
        [attr.data-testid]="'building-card-' + building.id"
      >
        <div class="site-card__top">
          <div>
            <div class="site-card__code">{{ building.id }}</div>
            <div class="site-card__name">{{ building.name }}</div>
            <div class="site-card__city">{{ building.location }} · {{ building.emirate }}</div>
          </div>

          <p-tag
            [value]="building.status"
            [severity]="severity(building.status)"
          />
        </div>

        <div class="site-card__metrics">
          <div>
            <strong>{{ building.deviceCount }}</strong>
            <span>Devices</span>
          </div>

          <div>
            <strong>{{ building.floors }}</strong>
            <span>Floors</span>
          </div>

          <div>
            <strong class="danger">{{ building.activeAlarms }}</strong>
            <span>Alarms</span>
          </div>
        </div>

        <div class="site-card__progress">
          <div>
            <span>Occupancy</span>
            <strong>{{ building.occupancy }}%</strong>
          </div>

          <div class="progress-bar">
            <div
              [style.width.%]="building.occupancy"
              [style.background]="occupancyColor(building.occupancy)"
            ></div>
          </div>
        </div>
      </a>
    }
  </div>
</section>
