<div class="settings-page" data-testid="settings-page">
  <!-- <div class="settings-header">
    <div>
      <p class="settings-eyebrow">System Configuration</p>
      <h1>Settings</h1>
      <p class="settings-subtitle">
        Manage tenant branding, appearance, access and active NOC workspace.
      </p>
    </div>
  </div> -->

  <div class="settings-grid">
    <!-- Tenant Branding -->
    <section class="settings-card" data-testid="tenant-branding-card">
      <div class="card-label">Tenant Branding</div>

      <h3>
        Configure
        <span>{{ tenantName() }}</span>
      </h3>

      <div class="form-stack">
        <div class="field">
          <label for="tenantName">Tenant Name</label>
          <input
            id="tenantName"
            pInputText
            type="text"
            [ngModel]="tenantName()"
            (ngModelChange)="tenantName.set($event)"
            data-testid="settings-tenant-name"
          />
        </div>

        <div class="field">
          <label for="logoUrl">Logo URL</label>
          <input
            id="logoUrl"
            pInputText
            type="text"
            placeholder="https://..."
            [ngModel]="logoUrl()"
            (ngModelChange)="logoUrl.set($event)"
            data-testid="settings-logo-url"
          />
        </div>

        <button
          pButton
          type="button"
          label="Save Branding"
          icon="pi pi-save"
          class="primary-action"
          data-testid="save-tenant-btn"
          (click)="saveBranding()"
        ></button>
      </div>
    </section>

    <!-- Appearance -->
    <section class="settings-card" data-testid="appearance-card">
      <div class="card-label">Appearance</div>

      <h3>Theme</h3>

      <div class="setting-row">
        <div>
          <div class="setting-title">Dark Mode</div>
          <p>
            Reduce eye strain during long NOC monitoring sessions.
          </p>
        </div>

        <p-toggleswitch
          [ngModel]="darkMode()"
          (ngModelChange)="darkMode.set($event)"
          data-testid="settings-theme-toggle"
        ></p-toggleswitch>
      </div>

      <div class="theme-preview" [class.theme-preview--dark]="darkMode()">
        <div class="preview-sidebar"></div>
        <div class="preview-content">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>

    <!-- Available Tenants -->
    <section class="settings-card settings-card--wide" data-testid="available-tenants-card">
      <div class="card-label">Available Tenants</div>

      <div class="tenant-grid">
        @for (tenant of tenants(); track tenant.id) {
          <button
            type="button"
            class="tenant-card"
            [class.tenant-card--active]="tenant.active"
            [attr.data-testid]="'tenant-card-' + tenant.id"
            (click)="selectTenant(tenant.id)"
          >
            <div class="tenant-card__top">
              <div class="tenant-avatar">
                {{ tenant.name.charAt(0) }}
              </div>

              @if (tenant.active) {
                <p-tag value="Active" severity="success"></p-tag>
              } @else {
                <p-tag value="Switch" severity="secondary"></p-tag>
              }
            </div>

            <div class="tenant-name">
              {{ tenant.name }}
            </div>

            <div class="tenant-meta">
              {{ tenant.type }} · {{ tenant.location }}
            </div>
          </button>
        }
      </div>
    </section>

    <!-- Profile -->
    <section class="settings-card settings-card--wide" data-testid="profile-card">
      <div class="card-label">Profile</div>

      <div class="profile-grid">
        <div class="profile-item">
          <label>Name</label>
          <strong>{{ profile.name }}</strong>
        </div>

        <div class="profile-item">
          <label>Email</label>
          <span class="mono">{{ profile.email }}</span>
        </div>

        <div class="profile-item">
          <label>Role</label>
          <strong>{{ profile.role }}</strong>
        </div>

        <div class="profile-item">
          <label>Access</label>
          <span class="mono">{{ profile.access }}</span>
        </div>
      </div>
    </section>
  </div>
</div>
