<section class="to-page" data-testid="network-map-page">
  <header class="to-page-header">
    <div>
      <h1 class="to-page-title">Network Map</h1>
      <p class="to-page-description">
        Monitor towers, buildings and warehouses across the UAE network.
      </p>
    </div>

    <p-button
      label="Refresh"
      icon="pi pi-refresh"
      severity="secondary"
      (click)="refreshMap()"
    />
  </header>

  <div class="to-toolbar">
    <div class="to-toolbar-left">
      <input
        pInputText
        type="search"
        placeholder="Search sites..."
        [ngModel]="search()"
        (ngModelChange)="search.set($event); refreshMap()"
      />

      <p-select
        [options]="typeOptions"
        [ngModel]="typeFilter()"
        (ngModelChange)="typeFilter.set($event); refreshMap()"
        optionLabel="label"
        optionValue="value"
        placeholder="Type"
      />

      <p-select
        [options]="statusOptions"
        [ngModel]="statusFilter()"
        (ngModelChange)="statusFilter.set($event); refreshMap()"
        optionLabel="label"
        optionValue="value"
        placeholder="Status"
      />
    </div>
  </div>

  <div class="to-map-shell">
    <div id="networkMap" class="to-map"></div>

    <div class="to-map-legend">
      <span><i class="healthy"></i>Healthy</span>
      <span><i class="warning"></i>Warning</span>
      <span><i class="critical"></i>Critical</span>
      <span><i class="offline"></i>Offline</span>
    </div>
  </div>

  <to-drawer
    [open]="drawerOpen()"
    size="compact"
    [title]="selectedSite()?.name || 'Site Details'"
    [eyebrow]="selectedSite()?.code || ''"
    (closed)="closeDrawer()"
  >
    @if (selectedSite(); as site) {
      <div class="to-detail-grid">
        <to-detail-field label="Type" [value]="site.type" />
        <to-detail-field label="Tenant" [value]="site.tenant" />
        <to-detail-field label="City" [value]="site.city" />
        <to-detail-field label="Address" [value]="site.address" />
        <to-detail-field label="Devices" [value]="site.devices" />
        <to-detail-field label="Alerts" [value]="site.alerts" />
        <to-detail-field label="Work Orders" [value]="site.workOrders" />
        <to-detail-field label="Latitude" [value]="site.lat" />
        <to-detail-field label="Longitude" [value]="site.lng" />
      </div>

      <div class="to-drawer-section">
        <h3>Status</h3>
        <to-status-badge
          [label]="site.status"
          [tone]="statusTone(site.status)"
        />
      </div>

      <ng-container drawer-actions>
        <p-button label="View Site" icon="pi pi-map-marker" />
        <p-button label="Devices" icon="pi pi-microchip" severity="secondary" />
      </ng-container>
    }
  </to-drawer>
</section>
