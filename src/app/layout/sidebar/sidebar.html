<aside
  data-testid="sidebar"
  class="to-sidebar"
  [class.to-sidebar--collapsed]="collapsed()"
>
  <!-- Brand -->
  <div class="to-sidebar__brand">
    <div class="to-sidebar__logo">T</div>

    <div *ngIf="!collapsed()" class="to-sidebar__brand-text">
      <div class="to-sidebar__title">TowerOps</div>
      <div class="to-sidebar__subtitle">NOC Platform</div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="to-sidebar__nav">
    <div
      *ngIf="!collapsed()"
      class="to-sidebar__section-title"
    >
      Navigation
    </div>

  <a
  *ngFor="let item of navItems"
  [routerLink]="item.path"
  routerLinkActive="active"
  [routerLinkActiveOptions]="{ exact: item.exact || false }"
  class="nav-link"
  [pTooltip]="collapsed() ? item.label : ''"
  tooltipPosition="right"
  [showDelay]="200"
  [hideDelay]="100"
  [attr.data-testid]="item.testId"
>
      <i [class]="item.icon"></i>

      <span *ngIf="!collapsed()" class="nav-link__label">
        {{ item.label }}
      </span>

      <span
        *ngIf="!collapsed() && item.label === 'Alarms' && alertCount() > 0"
        class="nav-link__badge"
      >
        {{ alertCount() }}
      </span>
    </a>

    <div class="to-sidebar__divider"></div>

    <div
      *ngIf="!collapsed()"
      class="to-sidebar__section-title"
    >
      Field Ops
    </div>

    <a
  routerLink="/mobile/jobs"
  routerLinkActive="active"
  class="nav-link"
  [pTooltip]="collapsed() ? 'Field Engineer' : ''"
  tooltipPosition="right"
  [showDelay]="200"
  [hideDelay]="100"
  data-testid="nav-field-engineer"
>
      <i class="pi pi-mobile"></i>

      <span *ngIf="!collapsed()" class="nav-link__label">
        Field Engineer
      </span>
    </a>
  </nav>

  <!-- Collapse -->
 <button
  type="button"
  class="to-sidebar__collapse"
  (click)="toggleSidebar()"
  [pTooltip]="collapsed() ? 'Expand Sidebar' : 'Collapse Sidebar'"
  tooltipPosition="right"
  [showDelay]="200"
  data-testid="sidebar-rail-toggle"
>
    <i
      class="fa-solid"
      [class.fa-angles-right]="collapsed()"
      [class.fa-angles-left]="!collapsed()"
    ></i>

    <span *ngIf="!collapsed()">Collapse</span>
  </button>

  <!-- User -->
  <div class="to-sidebar__user-wrap">
    <div
  class="to-sidebar__user"
  [class.to-sidebar__user--collapsed]="collapsed()"
  [pTooltip]="collapsed() ? 'Profile' : ''"
  tooltipPosition="right"
  [showDelay]="200"
>
      <div class="to-sidebar__avatar">
        {{ userInitial }}
      </div>

      <div *ngIf="!collapsed()" class="to-sidebar__user-info">
        <div class="to-sidebar__user-name">
          {{ user.name }}
        </div>
        <div class="to-sidebar__user-role">
          {{ user.role }}
        </div>
      </div>

      <button
        *ngIf="!collapsed()"
        type="button"
        class="to-sidebar__logout"
        title="Logout"
        data-testid="logout-btn"
        (click)="logout()"
      >
        <i class="pi pi-sign-out"></i>
      </button>
    </div>
  </div>
</aside>
